<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>GOLD RUNNER: ULTRA PRO</title>
    <style>
        :root { --gold: #ffd700; --cyan: #00f3ff; --pink: #ff00ff; --glass: rgba(255, 255, 255, 0.05); }
        body { margin: 0; background: #000; color: #fff; font-family: 'Segoe UI', sans-serif; overflow: hidden; touch-action: none; }
        canvas { display: block; position: absolute; top: 0; left: 0; z-index: 1; }

        /* 1. Loading Screen */
        #loader { 
            position: fixed; width: 100%; height: 100%; background: #000; 
            display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 2000; 
        }
        .spin { border: 4px solid rgba(0,243,255,0.1); border-left-color: var(--cyan); border-radius: 50%; width: 50px; height: 50px; animation: s 1s linear infinite; }
        @keyframes s { to { transform: rotate(360deg); } }

        /* 2. HUD & Menus */
        #hud { position: fixed; top: 15px; left: 15px; z-index: 100; font-size: 0.8rem; color: var(--cyan); font-weight: bold; }
        .glass-panel { 
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); 
            background: rgba(0, 0, 0, 0.9); backdrop-filter: blur(25px); 
            border: 1px solid var(--cyan); padding: 30px; border-radius: 30px; 
            text-align: center; z-index: 500; width: 85%; max-width: 340px; display: none;
        }

        .neon-btn { background: transparent; border: 1px solid var(--cyan); color: var(--cyan); padding: 12px; width: 100%; border-radius: 8px; font-weight: bold; margin-top: 15px; cursor: pointer; text-transform: uppercase; }
        .neon-btn:hover { background: var(--cyan); color: #000; box-shadow: 0 0 20px var(--cyan); }

        /* 3. Ad Simulation */
        #ad-box { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 1500; display: none; flex-direction: column; justify-content: center; align-items: center; }
        
        .setting-row { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; border-bottom: 1px solid #222; font-size: 0.8rem; }
    </style>
</head>
<body>

    <div id="loader"><div class="spin"></div><p style="letter-spacing:2px; margin-top:15px;">SYNCING NEURAL LINK...</p></div>

    <div id="hud">LVL: <span id="lvl">1</span> | SCORE: <span id="scr">0</span></div>

    <div id="ad-box">
        <h2 style="color:var(--cyan)">STREAMING AD...</h2>
        <p id="ad-timer" style="font-size: 3rem; color:white;">5</p>
        <div style="width:200px; height:100px; border:1px solid #333; display:flex; align-items:center; justify-content:center; color:#444; font-size:0.7rem;">[ VIDEO AD MOCKUP ]</div>
    </div>

    <div id="main-menu" class="glass-panel" style="display: block;">
        <h1 style="color:var(--gold); margin:0; letter-spacing: 5px;">GOLD RUNNER</h1>
        <button class="neon-btn" onclick="startGame()">Initiate Link</button>
        <button class="neon-btn" style="border-color:var(--pink); color:var(--pink);" onclick="toggleMenu('settings-menu')">Config Settings</button>
    </div>

    <div id="settings-menu" class="glass-panel">
        <h2 style="color:var(--cyan)">System Config</h2>
        <div class="setting-row"><span>History Record</span> <span id="h-toggle" onclick="historyOn=!historyOn; this.innerText=historyOn?'ON':'OFF'" style="color:var(--gold); cursor:pointer;">ON</span></div>
        <div class="setting-row"><span>Current Award</span> <span id="award" style="color:var(--gold)">NOVICE</span></div>
        <div class="setting-row"><span>Shields Used</span> <span id="s-count" style="color:var(--cyan)">0</span></div>
        <div class="setting-row"><span>Global Best</span> <span id="bst-score" style="color:var(--gold)">0</span></div>
        <button class="neon-btn" onclick="toggleMenu('main-menu')">Back to Terminal</button>
    </div>

    <div id="game-over" class="glass-panel">
        <h2 style="color:var(--pink);">Link Severed</h2>
        <p>Data: <span id="final-scr">0</span></p>
        <button class="neon-btn" onclick="location.reload()">Re-Sync</button>
    </div>

    <canvas id="gameCanvas"></canvas>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        let score = 0, level = 1, gameActive = false, drips = [], chips = [], powerups = [];
        let player = { x: 0, y: 0, r: 18, shield: false };
        let historyOn = true, shieldsUsed = 0;
        
        let best = localStorage.getItem('goldBotBest') || 0;
        document.getElementById('bst-score').innerText = best;

        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        function playSfx(f, t, d) {
            const o = audioCtx.createOscillator(); const g = audioCtx.createGain();
            o.type = t; o.frequency.value = f; g.gain.value = 0.05;
            o.connect(g); g.connect(audioCtx.destination);
            o.start(); o.stop(audioCtx.currentTime + d);
        }

        function toggleMenu(id) {
            document.querySelectorAll('.glass-panel').forEach(p => p.style.display = 'none');
            document.getElementById(id).style.display = 'block';
        }

        function startGame() {
            if (audioCtx.state === 'suspended') audioCtx.resume();
            document.getElementById('main-menu').style.display = 'none';
            canvas.width = window.innerWidth; canvas.height = window.innerHeight;
            player.x = canvas.width/2; player.y = canvas.height - 150;
            gameActive = true; animate();
        }

        function triggerAd() {
            gameActive = false;
            const adBox = document.getElementById('ad-box'); adBox.style.display = 'flex';
            let t = 5;
            let int = setInterval(() => {
                t--; document.getElementById('ad-timer').innerText = t;
                if(t <= 0) { clearInterval(int); adBox.style.display = 'none'; gameActive = true; requestAnimationFrame(animate); }
            }, 1000);
        }

        function animate() {
            if(!gameActive) return;
            ctx.fillStyle = 'rgba(0, 0, 0, 0.2)'; ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Enemies (Molten Drips)
            if(Math.random() < 0.04 + (level*0.01)) drips.push({ x: Math.random()*canvas.width, y: -50, h: 50, s: 3 + (level * 0.7), c: Math.random()>0.5? '#00f3ff':'#ff00ff' });
            // Shield Powerup
            if(Math.random() < 0.005) powerups.push({ x: Math.random()*canvas.width, y: -50, s: 2.5 });
            // Gold Chips
            if(Math.random() < 0.02) chips.push({ x: Math.random()*canvas.width, y: -20, s: 2 });

            drips.forEach((d, i) => {
                d.y += d.s;
                ctx.fillStyle = d.c; ctx.shadowBlur = 10; ctx.shadowColor = d.c;
                ctx.fillRect(d.x-2, d.y-d.h, 4, d.h);
                if(!player.shield && Math.hypot(player.x-d.x, player.y-d.y) < player.r + 5) {
                    playSfx(100, 'sawtooth', 0.4); gameActive = false;
                    toggleMenu('game-over'); document.getElementById('final-scr').innerText = score;
                }
                if(d.y > canvas.height + 100) drips.splice(i, 1);
            });

            powerups.forEach((p, i) => {
                p.y += p.s;
                ctx.strokeStyle = '#00f3ff'; ctx.lineWidth = 2; ctx.beginPath(); ctx.arc(p.x, p.y, 10, 0, 6.28); ctx.stroke();
                if(Math.hypot(player.x-p.x, player.y-p.y) < player.r + 10) {
                    powerups.splice(i, 1); player.shield = true; shieldsUsed++;
                    document.getElementById('s-count').innerText = shieldsUsed;
                    playSfx(500, 'sine', 0.2);
                    setTimeout(() => player.shield = false, 5000);
                }
            });

            chips.forEach((c, i) => {
                c.y += c.s;
                ctx.fillStyle = '#ffd700'; ctx.beginPath(); ctx.arc(c.x, c.y, 8, 0, 6.28); ctx.fill();
                if(Math.hypot(player.x-c.x, player.y-c.y) < player.r + 10) {
                    score += 20; chips.splice(i, 1); playSfx(800, 'sine', 0.1);
                    document.getElementById('scr').innerText = score;
                    if(historyOn && score > best) { best = score; localStorage.setItem('goldBotBest', best); document.getElementById('bst-score').innerText = best; }
                    if(score >= 500) document.getElementById('award').innerText = "ELITE";
                    if(score >= 1000) document.getElementById('award').innerText = "LEGEND";
                    if(score % 200 === 0) { level++; document.getElementById('lvl').innerText = level; triggerAd(); }
                }
            });

            // Draw Cute Player
            ctx.save();
            if(player.shield) { ctx.shadowBlur = 20; ctx.shadowColor = '#00f3ff'; ctx.strokeStyle = '#00f3ff'; ctx.beginPath(); ctx.arc(player.x, player.y, player.r + 5, 0, 6.28); ctx.stroke(); }
            ctx.shadowBlur = 20; ctx.shadowColor = '#ffd700'; ctx.fillStyle = '#ffd700';
            ctx.beginPath(); ctx.arc(player.x, player.y, player.r, 0, 6.28); ctx.fill();
            ctx.fillStyle = '#000'; ctx.beginPath(); ctx.arc(player.x-6, player.y-2, 2.5, 0, 6.28); ctx.fill(); ctx.beginPath(); ctx.arc(player.x+6, player.y-2, 2.5, 0, 6.28); ctx.fill();
            ctx.strokeStyle = '#000'; ctx.lineWidth = 1; ctx.beginPath(); ctx.arc(player.x, player.y+2, 6, 0.2*Math.PI, 0.8*Math.PI); ctx.stroke();
            ctx.restore();

            requestAnimationFrame(animate);
        }

        window.addEventListener('pointermove', (e) => { if(gameActive){ player.x = e.clientX; player.y = e.clientY; } });
        window.onload = () => { setTimeout(() => document.getElementById('loader').style.display = 'none', 2000); };
    </script>
</body>
</html>
