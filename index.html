DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>AURA AI OS | Community Fixed</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
    <style>
        :root { --cyan: #00f3ff; --pink: #ff00ff; --glass: rgba(255, 255, 255, 0.1); --bg: #020202; }
        * { box-sizing: border-box; font-family: 'Rajdhani', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { margin: 0; background: var(--bg); color: white; overflow: hidden; height: 100vh; position: relative; }

        /* Background Layer */
        .bg-layer { position: fixed; inset: 0; z-index: -10; background: linear-gradient(135deg, #001a1a 0%, #1a001a 100%); animation: auraFlow 10s infinite alternate; }
        @keyframes auraFlow { 0% { filter: hue-rotate(0deg); } 100% { filter: hue-rotate(45deg); } }

        /* NEON GADGET RAIN */
        .rain-container { position: fixed; inset: 0; pointer-events: none; z-index: -1; overflow: hidden; }
        .tech-drop { position: absolute; top: -50px; font-size: 2rem; color: var(--cyan); text-shadow: 0 0 10px var(--cyan); animation: fall linear forwards; opacity: 0.8; }
        @keyframes fall { to { transform: translateY(110vh) rotate(360deg); opacity: 0; } }

        /* INTRO OVERLAY */
        #tour-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.98); z-index: 10000; display: none; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 30px; }
        .tour-box { background: var(--glass); border: 2px solid var(--cyan); padding: 30px; border-radius: 40px; box-shadow: 0 0 50px var(--cyan); max-width: 360px; backdrop-filter: blur(10px); }

        /* NAVIGATION */
        nav { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); display: flex; gap: 20px; background: rgba(0,0,0,0.85); padding: 15px 30px; border-radius: 60px; z-index: 2000; border: 1px solid rgba(255,255,255,0.1); }
        .nav-link { cursor: pointer; opacity: 0.4; font-size: 0.75rem; font-weight: 700; transition: 0.3s; color: white; }
        .nav-link.active { opacity: 1; color: var(--cyan); text-shadow: 0 0 10px var(--cyan); }

        /* SIDEBAR & MENU */
        .neon-menu-btn { position: fixed; top: 25px; right: 25px; z-index: 5000; width: 35px; height: 25px; display: flex; flex-direction: column; justify-content: space-between; cursor: pointer; }
        .line { height: 3px; width: 100%; background: var(--cyan); border-radius: 10px; box-shadow: 0 0 10px var(--cyan); }
        #sidebar { position: fixed; top: 0; right: -100%; width: 280px; height: 100%; background: rgba(0,0,0,0.98); z-index: 4500; padding: 80px 25px; transition: 0.5s; border-left: 2px solid var(--cyan); }
        #sidebar.open { right: 0; }

        /* UI PANELS */
        .glass-panel { background: var(--glass); backdrop-filter: blur(40px); border: 1px solid rgba(255,255,255,0.1); border-radius: 40px; width: 90%; max-width: 400px; padding: 25px; text-align: center; position: absolute; top: 48%; left: 50%; transform: translate(-50%, -50%); border: 1px solid var(--cyan); }
        .page { display: none; max-height: 400px; overflow-y: auto; scrollbar-width: none; }
        .page::-webkit-scrollbar { display: none; }
        .page.active { display: block; animation: fadeIn 0.4s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } }

        .btn { width: 100%; padding: 15px; border-radius: 30px; border: none; background: linear-gradient(90deg, var(--cyan), var(--pink)); color: #000; font-weight: 800; cursor: pointer; font-family: 'Orbitron'; margin-top: 10px; }
        textarea, input { width: 100%; background: rgba(0,0,0,0.5); border: 1px solid var(--cyan); border-radius: 15px; color: white; padding: 12px; margin: 10px 0; outline: none; }
        
        /* Wall Card */
        .wall-card { background: rgba(255,255,255,0.05); padding: 12px; border-radius: 15px; margin-bottom: 10px; border-left: 3px solid var(--pink); text-align: left; }
    </style>
</head>
<body onclick="initAudio()">

    <div class="bg-layer"></div>
    <div class="rain-container" id="rain-box"></div>

    <div id="tour-overlay">
        <div class="tour-box">
            <h2 id="tour-title" style="font-family:'Orbitron'; color: var(--cyan);">SYSTEM BOOT...</h2>
            <p id="tour-desc">AURA AI OS is ready. Let's set up your profile.</p>
            <button class="btn" onclick="nextStep()">CONTINUE →</button>
        </div>
    </div>

    <div class="neon-menu-btn" onclick="toggleSide()">
        <div class="line"></div>
        <div class="line" style="background:var(--pink); box-shadow: 0 0 10px var(--pink);"></div>
        <div class="line"></div>
    </div>

    <div id="sidebar">
        <h2 style="font-family:'Orbitron'; color: var(--pink);">OS CONFIG</h2>
        <div style="text-align:left; margin-bottom:10px;">
            <label style="font-size:0.8rem; opacity:0.7;">USER NAME:</label>
            <input type="text" id="nameIn" placeholder="Change name..." onkeyup="saveName(this.value)">
        </div>
        
        <div style="display:flex; justify-content:space-between; margin:15px 0;">
            <span>LOFI MUSIC</span>
            <input type="checkbox" id="lofiToggle" onchange="toggleLofi(this.checked)">
        </div>
        
        <div style="display:flex; justify-content:space-between; margin:15px 0;">
            <span>NEON RAIN</span>
            <input type="checkbox" id="rainToggle" checked onchange="config.rain = this.checked">
        </div>
        
        <button class="btn" style="background:transparent; border:1px solid var(--cyan); color:var(--cyan); font-size:0.7rem;" onclick="resetApp()">FACTORY RESET</button>
        <button class="btn" onclick="toggleSide()" style="margin-top:20px;">CLOSE</button>
    </div>

    <div class="glass-panel">
        <div id="home" class="page active">
            <h2 id="greet" style="font-family:'Orbitron'; color: var(--cyan);">WELCOME, USER</h2>
            <div style="font-size: 3.5rem; font-family:'Orbitron'; margin: 10px 0;" id="clock">00:00</div>
            <div style="background:rgba(0,0,0,0.3); padding:12px; border-radius:20px; border:1px solid var(--pink);">ZEN SCORE: <b id="z-pts">0</b></div>
            <button class="btn" onclick="boost()">BOOST CORE</button>
        </div>

        <div id="purge" class="page">
            <h2 style="font-family:'Orbitron'; color: var(--cyan);">MIND PURGE</h2>
            <textarea id="stressIn" placeholder="Release your stress..."></textarea>
            <button class="btn" onclick="purgeHeal()">EXECUTE PURGE</button>
            <div id="res-box" style="display:none; margin-top:15px;">
                <div id="sol" style="font-size:0.85rem; padding:15px; border-radius:15px; border:1px solid var(--pink); text-align:left; background:rgba(0,0,0,0.3);"></div>
                <button class="btn" onclick="resetPurge()">NEW PURGE</button>
            </div>
        </div>

        <div id="wall" class="page">
            <h2 style="font-family:'Orbitron'; color: var(--pink);">COMMUNITY</h2>
            <div id="stars" style="font-size:1.5rem; margin-bottom:10px; cursor:pointer; color:#444;">
                <span onclick="setR(1)">★</span><span onclick="setR(2)">★</span><span onclick="setR(3)">★</span><span onclick="setR(4)">★</span><span onclick="setR(5)">★</span>
            </div>
            <textarea id="wallIn" placeholder="Public feedback..."></textarea>
            <small style="opacity:0.6; display:block; margin-bottom:5px;">⚠️ Feedbacks are public 🌐</small>
            <button class="btn" onclick="postWall()">POST FEEDBACK</button>
            <hr style="border:0; border-top:1px solid rgba(255,255,255,0.1); margin:20px 0;">
            <div id="wallList"></div>
        </div>
    </div>

    <nav>
        <div class="nav-link active" onclick="nav('home', this)">CORE</div>
        <div class="nav-link" onclick="nav('purge', this)">PURGE</div>
        <div class="nav-link" onclick="nav('wall', this)">WALL</div>
    </nav>

    <script>
        let userName = localStorage.getItem('aura_n') || "User";
        let zen = 0; let tStep = 0; let rating = 0;
        let config = { rain: true };
        let audioCtx, lofiOsc;

        function initAudio() { if(!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)(); }

        const tour = [
            { t: "AURA CORE", d: "Track your Zen score and boost your mental performance." },
            { t: "MIND PURGE", d: "Clear stress and get AI solutions." },
            { t: "COMMUNITY WALL", d: "See what others are saying about AURA OS." },
            { t: "CONFIG MENU", d: "Tap the neon lines to change name and music." }
        ];

        window.onload = () => {
            if(!localStorage.getItem('aura_tour_done')) document.getElementById('tour-overlay').style.display = 'flex';
            saveName(userName);
            renderWall(); // Isse load hote hi feedbacks dikhenge
            startRain();
        };

        function nextStep() {
            if(tStep < tour.length) {
                document.getElementById('tour-title').innerText = tour[tStep].t;
                document.getElementById('tour-desc').innerText = tour[tStep].d;
                tStep++;
            } else {
                document.getElementById('tour-overlay').style.display = 'none';
                localStorage.setItem('aura_tour_done', 'true');
            }
        }

        function toggleSide() { document.getElementById('sidebar').classList.toggle('open'); }

        function saveName(v) {
            userName = v || "User";
            localStorage.setItem('aura_n', userName);
            document.getElementById('greet').innerText = `WELCOME, ${userName.toUpperCase()}`;
            document.getElementById('nameIn').value = (userName === "User") ? "" : userName;
        }

        function nav(p, el) {
            document.querySelectorAll('.page').forEach(x => x.classList.remove('active'));
            document.querySelectorAll('.nav-link').forEach(x => x.classList.remove('active'));
            document.getElementById(p).classList.add('active');
            el.classList.add('active');
            if(p === 'wall') renderWall(); // Refresh wall on click
        }

        function toggleLofi(on) {
            initAudio();
            if(on) {
                lofiOsc = audioCtx.createOscillator();
                const g = audioCtx.createGain();
                lofiOsc.type = 'triangle'; lofiOsc.frequency.value = 110; g.gain.value = 0.01;
                lofiOsc.connect(g); g.connect(audioCtx.destination); lofiOsc.start();
            } else if(lofiOsc) { lofiOsc.stop(); }
        }

        function setR(r) {
            rating = r;
            const s = document.querySelectorAll('#stars span');
            s.forEach((span, i) => span.style.color = (i < r) ? "#ffca08" : "#444");
        }

        function postWall() {
            const val = document.getElementById('wallIn').value;
            if(!val || rating === 0) return;
            let feeds = JSON.parse(localStorage.getItem('aura_wall_data')) || [];
            feeds.unshift({ n: userName, m: val, r: rating });
            localStorage.setItem('aura_wall_data', JSON.stringify(feeds));
            document.getElementById('wallIn').value = "";
            setR(0); 
            renderWall();
        }

        function renderWall() {
            let feeds = JSON.parse(localStorage.getItem('aura_wall_data')) || [];
            const list = document.getElementById('wallList');
            if(feeds.length === 0) {
                list.innerHTML = "<p style='opacity:0.4; font-size:0.8rem;'>No logs yet. Be the first!</p>";
                return;
            }
            list.innerHTML = feeds.map(f => `
                <div class="wall-card">
                    <b style="color:var(--cyan);">${f.n.toUpperCase()}</b> <span style="color:#ffca08">${"★".repeat(f.r)}</span><br>
                    <small style="opacity:0.9;">${f.m}</small>
                </div>
            `).join('');
        }

        function purgeHeal() {
            const i = document.getElementById('stressIn'), b = document.getElementById('res-box');
            if(!i.value.trim()) return;
            i.style.display = "none"; b.style.display = "block";
            document.getElementById('sol').innerText = `${userName}, listen. You are a warrior. Every bad day is just training for your comeback. ✨`;
            zen += 50; document.getElementById('z-pts').innerText = zen;
        }

        function resetPurge() { document.getElementById('stressIn').style.display = "block"; document.getElementById('stressIn').value = ""; document.getElementById('res-box').style.display = "none"; }
        function boost() { zen += 100; document.getElementById('z-pts').innerText = zen; }
        function resetApp() { localStorage.clear(); location.reload(); }

        function startRain() {
            setInterval(() => {
                if(!config.rain) return;
                const drop = document.createElement('div');
                drop.className = 'tech-drop';
                drop.innerText = ['📱','💻','⌚','🎧'][Math.floor(Math.random()*4)];
                drop.style.left = Math.random() * 100 + "vw";
                drop.style.animationDuration = (Math.random() * 3 + 2) + "s";
                document.getElementById('rain-box').appendChild(drop);
                setTimeout(() => drop.remove(), 5000);
            }, 600);
        }

        setInterval(() => { document.getElementById('clock').innerText = new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'}); }, 1000);
    </script>
</body>
    </html>
